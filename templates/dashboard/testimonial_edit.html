{% extends 'dashboard/base_dashboard.html' %}

{% block title %}{% if is_edit %}Edit{% else %}Add{% endif %} Testimonial{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-chat-quote-fill"></i> {% if is_edit %}Edit{% else %}Add New{% endif %} Testimonial</h2>
    <a href="{% url 'dashboard:testimonials' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card"><div class="card-body">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-8">
                <div class="mb-3"><label class="form-label">Client Name *</label><input type="text" name="client_name" class="form-control" value="{{ testimonial.client_name|default:'' }}" required></div>
                <div class="mb-3"><label class="form-label">Position</label><input type="text" name="client_position" class="form-control" value="{{ testimonial.client_position|default:'' }}"></div>
                <div class="mb-3"><label class="form-label">Company</label><input type="text" name="client_company" class="form-control" value="{{ testimonial.client_company|default:'' }}"></div>
                <div class="mb-3"><label class="form-label">Content *</label><textarea name="content" class="form-control" rows="5" required>{{ testimonial.content|default:'' }}</textarea></div>
            </div>
            <div class="col-md-4">
                <div class="mb-3"><label class="form-label">Language</label><select name="language" class="form-select"><option value="">Select</option>{% for lang in languages %}<option value="{{ lang.id }}" {% if testimonial.language.id == lang.id %}selected{% endif %}>{{ lang.name }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Rating (1-5)</label><select name="rating" class="form-select"><option value="5" {% if testimonial.rating == 5 %}selected{% endif %}>5 ★★★★★</option><option value="4" {% if testimonial.rating == 4 %}selected{% endif %}>4 ★★★★☆</option><option value="3" {% if testimonial.rating == 3 %}selected{% endif %}>3 ★★★☆☆</option><option value="2" {% if testimonial.rating == 2 %}selected{% endif %}>2 ★★☆☆☆</option><option value="1" {% if testimonial.rating == 1 %}selected{% endif %}>1 ★☆☆☆☆</option></select></div>
                <div class="mb-3"><label class="form-label">Order</label><input type="number" name="order" class="form-control" value="{{ testimonial.order|default:0 }}"></div>
                <div class="mb-3"><label class="form-label">Client Image</label>{% if testimonial.client_image %}<div class="mb-2"><img src="{{ testimonial.client_image.url }}" class="rounded-circle" style="width:80px;height:80px;object-fit:cover;"></div>{% endif %}<input type="file" name="client_image" class="form-control" accept="image/*"></div>
                <div class="mb-3"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if testimonial.is_active or not testimonial %}checked{% endif %}><label class="form-check-label" for="active">Active</label></div></div>
            </div>
        </div>
        <div class="text-end"><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Testimonial</button></div>
    </form>
</div></div>
{% endblock %}
