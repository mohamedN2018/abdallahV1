{% extends 'dashboard/base_dashboard.html' %}

{% block title %}{% if is_edit %}Edit{% else %}Add{% endif %} Service{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-briefcase-fill"></i> {% if is_edit %}Edit{% else %}Add New{% endif %} Service</h2>
    <a href="{% url 'dashboard:services' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card"><div class="card-body">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-8">
                <div class="mb-3"><label class="form-label">Title *</label><input type="text" name="title" class="form-control" value="{{ service.title|default:'' }}" required></div>
                <div class="mb-3"><label class="form-label">Slug *</label><input type="text" name="slug" class="form-control" value="{{ service.slug|default:'' }}" required></div>
                <div class="mb-3"><label class="form-label">Short Description *</label><textarea name="short_description" class="form-control" rows="2" required>{{ service.short_description|default:'' }}</textarea></div>
                <div class="mb-3"><label class="form-label">Full Description *</label><textarea name="full_description" class="form-control" rows="5" required>{{ service.full_description|default:'' }}</textarea></div>
                <div class="mb-3"><label class="form-label">Features (one per line)</label><textarea name="features" class="form-control" rows="3" placeholder="Feature 1&#10;Feature 2&#10;Feature 3">{{ service.features|join:"\n"|default:'' }}</textarea></div>
            </div>
            <div class="col-md-4">
                <div class="mb-3"><label class="form-label">Language</label><select name="language" class="form-select"><option value="">Select</option>{% for lang in languages %}<option value="{{ lang.id }}" {% if service.language.id == lang.id %}selected{% endif %}>{{ lang.name }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Icon Class</label><input type="text" name="icon" class="form-control" value="{{ service.icon|default:'' }}" placeholder="e.g., code, gear, star"></div>
                <div class="mb-3"><label class="form-label">Image</label>{% if service.image %}<div class="mb-2"><img src="{{ service.image.url }}" class="img-fluid rounded" style="max-height: 100px;"></div>{% endif %}<input type="file" name="image" class="form-control" accept="image/*"></div>
                <div class="mb-3"><label class="form-label">Order</label><input type="number" name="order" class="form-control" value="{{ service.order|default:0 }}"></div>
                <div class="mb-3"><div class="form-check"><input type="checkbox" name="is_featured" class="form-check-input" id="featured" {% if service.is_featured %}checked{% endif %}><label class="form-check-label" for="featured">Featured Service</label></div></div>
                <div class="mb-3"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if service.is_active or not service %}checked{% endif %}><label class="form-check-label" for="active">Active</label></div></div>
            </div>
        </div>
        <div class="text-end"><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Service</button></div>
    </form>
</div></div>

<script>
    const titleInput = document.querySelector('input[name="title"]');
    const slugInput = document.querySelector('input[name="slug"]');
    if (titleInput && slugInput && !slugInput.value) {
        titleInput.addEventListener('keyup', function() {
            slugInput.value = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        });
    }
</script>
{% endblock %}
