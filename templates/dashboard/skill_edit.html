{% extends 'dashboard/base_dashboard.html' %}

{% block title %}{% if is_edit %}Edit{% else %}Add{% endif %} Skill{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-code-slash"></i> {% if is_edit %}Edit{% else %}Add New{% endif %} Skill</h2>
    <a href="{% url 'dashboard:skills' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
</div>

<div class="card"><div class="card-body">
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3"><label class="form-label">Skill Name *</label><input type="text" name="name" class="form-control" value="{{ skill.name|default:'' }}" required></div>
                <div class="mb-3"><label class="form-label">Proficiency (%) *</label><input type="number" name="proficiency" class="form-control" value="{{ skill.proficiency|default:80 }}" min="0" max="100" required></div>
                <div class="mb-3"><label class="form-label">Years of Experience</label><input type="number" name="years_of_experience" class="form-control" value="{{ skill.years_of_experience|default:0 }}" step="0.5"></div>
                <div class="mb-3"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="3">{{ skill.description|default:'' }}</textarea></div>
            </div>
            <div class="col-md-6">
                <div class="mb-3"><label class="form-label">Language</label><select name="language" class="form-select"><option value="">Select</option>{% for lang in languages %}<option value="{{ lang.id }}" {% if skill.language.id == lang.id %}selected{% endif %}>{{ lang.name }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Category</label><select name="category" class="form-select"><option value="">Select</option>{% for cat in categories %}<option value="{{ cat.id }}" {% if skill.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>{% endfor %}</select></div>
                <div class="mb-3"><label class="form-label">Icon Class</label><input type="text" name="icon" class="form-control" value="{{ skill.icon|default:'' }}" placeholder="e.g., code, gear, star"></div>
                <div class="mb-3"><label class="form-label">Order</label><input type="number" name="order" class="form-control" value="{{ skill.order|default:0 }}"></div>
                <div class="mb-3"><div class="form-check"><input type="checkbox" name="is_active" class="form-check-input" id="active" {% if skill.is_active or not skill %}checked{% endif %}><label class="form-check-label" for="active">Active</label></div></div>
            </div>
        </div>
        <div class="text-end"><button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Save Skill</button></div>
    </form>
</div></div>
{% endblock %}
